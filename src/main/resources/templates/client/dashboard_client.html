<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bảng điều khiển</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/dashboard_client.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body class="flex h-screen">

<aside class="w-72 bg-custom-sidebar border-r border-white/5 flex flex-col shrink-0 relative z-20">
    <div class="p-8">
        <div class="flex items-center gap-3 text-emerald-400 font-bold tracking-widest text-sm">
            <i class="fas fa-graduation-cap"></i>
            <span>Sinh Viên</span>
        </div>
    </div>

    <nav class="flex-1 px-4 space-y-2">
        <a th:href="@{/client/dashboardClient}" class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border-l-4 border-gold text-white group transition-all">
            <div class="flex items-center gap-4">
                <i class="fas fa-th-large text-gold"></i>
                <span class="font-medium text-[15px]">Bảng điều khiển</span>
            </div>
        </a>

        <a th:href="@{/client/booking}" class="flex items-center gap-4 p-4 text-gray-400 hover:bg-white/5 rounded-2xl transition-all group">
            <i class="far fa-calendar-alt group-hover:text-white"></i>
            <span class="text-[15px]">Đặt lịch tư vấn</span>
        </a>

        <a th:href="@{/client/history}" class="flex items-center gap-4 p-4 text-gray-400 hover:bg-white/5 rounded-2xl transition-all group">
            <i class="fas fa-book group-hover:text-white"></i>
            <span class="text-[15px]">Lịch sử học tập</span>
        </a>

        <a th:href="@{/client/profile}" class="flex items-center gap-4 p-4 text-gray-400 hover:bg-white/5 rounded-2xl transition-all group">
            <i class="fas fa-user group-hover:text-white"></i>
            <span class="text-[15px]">Hồ sơ cá nhân</span>
        </a>
    </nav>

    <div class="px-4 py-6 border-t border-white/5 space-y-2">
        <a href="#" class="flex items-center justify-between p-4 text-gray-400 hover:bg-white/5 rounded-2xl transition-all">
            <div class="flex items-center gap-4">
                <i class="far fa-bell"></i>
                <span class="text-[15px]">Thông báo</span>
            </div>
            <span class="bg-gold/20 text-gold text-[10px] font-bold px-2 py-0.5 rounded-full">2</span>
        </a>
        <a href="#" class="flex items-center gap-4 p-4 text-gray-400 hover:bg-white/5 rounded-2xl transition-all">
            <i class="fas fa-cog"></i>
            <span class="text-[15px]">Cài đặt</span>
        </a>
    </div>

    <div class="p-4 border-t border-white/5 bg-black/20">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full overflow-hidden border border-white/10 flex items-center justify-center bg-gold text-black font-bold">
                    <img th:if="${userImage != null and userImage != ''}" th:src="${userImage}" class="w-full h-full object-cover">
                    <span th:unless="${userImage != null and userImage != ''}" th:text="${#strings.substring(userDTO.fullName,0,1)}">N</span>
                </div>
                <div>
                    <p class="text-[13px] font-bold text-white truncate w-32" th:text="${userDTO.fullName}">Full Name</p>
                    <p class="text-[10px] text-gray-500 uppercase tracking-tight" th:text="${userDTO.username}">Username</p>
                </div>
            </div>
            <a th:href="@{/auth/logout}" class="text-gray-500 hover:text-white transition-all">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </div>
</aside>

<main class="flex-1 flex flex-col items-center justify-center relative overflow-hidden bg-[#0B0E14]">

    <div class="absolute top-8 right-8 z-30">
        <a th:href="@{/client/booking}"
           class="group relative inline-flex items-center gap-3 px-6 py-3 bg-gold text-black font-bold rounded-2xl transition-all hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(255,215,0,0.3)]">
            <i class="far fa-calendar-check text-lg"></i>
            <span>Đặt lịch tư vấn ngay</span>
            <span class="absolute inset-0 rounded-2xl border-2 border-gold animate-ping opacity-20 group-hover:opacity-40"></span>
        </a>
    </div>

    <div class="anime-aura"></div>

    <div class="star star-gold w-1.5 h-1.5 top-[15%] left-[30%]" style="animation-delay: 0.1s;"></div>
    <div class="star star-white w-1 h-1 top-[22%] left-[45%]" style="animation-delay: 1.1s;"></div>
    <div class="star star-gold w-1 h-1 top-[10%] left-[55%]" style="animation-delay: 2.1s;"></div>
    <div class="star star-white w-1.5 h-1.5 top-[28%] left-[70%]" style="animation-delay: 0.6s;"></div>

    <div class="star star-white w-2 h-2 top-[50%] left-[25%]" style="animation-delay: 0.3s;"></div>
    <div class="star star-gold w-1.5 h-1.5 top-[65%] left-[20%]" style="animation-delay: 1.3s;"></div>
    <div class="star star-white w-1 h-1 top-[40%] left-[75%]" style="animation-delay: 2.3s;"></div>
    <div class="star star-gold w-2 h-2 top-[75%] left-[78%]" style="animation-delay: 0.9s;"></div>
    <div class="star star-white w-1 h-1 top-[80%] left-[35%]" style="animation-delay: 3.1s;"></div>
    <div class="star star-gold w-1 h-1 top-[55%] left-[60%]" style="animation-delay: 1.7s;"></div>
    <div class="star star-white w-1.5 h-1.5 top-[68%] left-[55%]" style="animation-delay: 2.7s;"></div>

    <div class="star star-white w-1 h-1 top-[8%] left-[85%]" style="animation-delay: 1.5s;"></div>
    <div class="star star-gold w-1.5 h-1.5 top-[5%] left-[15%]" style="animation-delay: 2.5s;"></div>
    <div class="star star-white w-1 h-1 bottom-[15%] left-[15%]" style="animation-delay: 0.8s;"></div>
    <div class="star star-gold w-2 h-2 bottom-[10%] left-[85%]" style="animation-delay: 1.9s;"></div>


    <div class="text-center relative z-10 mb-12">
        <h1 class="text-4xl md:text-5xl neon-text mb-4">
            Chào mừng quay trở lại!
        </h1>
        <p class="text-gray-400 text-lg font-light tracking-widest uppercase">
            Hôm nay bạn thấy thế nào, <span class="text-white font-bold" th:text="${userDTO.fullName}">Hoàn</span>?
        </p>
    </div>

    <div class="relative z-10 mb-8">
        <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExa3N5eWptbThrb2VmZ28zbTV5YXN2ZmljcWw4MGYzYzNxc3owbnRzayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xlcR4sYSBT34fQqApS/giphy.gif"
             alt="Anime Dance"
             class="w-64 md:w-80 drop-shadow-[0_0_30px_rgba(255,215,0,0.3)]">
    </div>

    <div class="absolute inset-0 pointer-events-none z-10">
        <div class="absolute top-1/4 left-1/4 w-1 h-1 bg-white rounded-full opacity-20 animate-ping"></div>
        <div class="absolute bottom-1/3 right-1/4 w-2 h-2 bg-gold rounded-full opacity-10 animate-bounce"></div>
        <div class="absolute top-1/2 right-1/10 w-1 h-1 bg-white rounded-full opacity-20 animate-pulse"></div>
    </div>

</main>

</body>
</html>
